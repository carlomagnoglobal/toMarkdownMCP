name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY: to_markdown_mcp

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            label: macos-x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            label: linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf $BINARY-${{ github.ref_name }}-${{ matrix.label }}.tar.gz $BINARY
          mv $BINARY-${{ github.ref_name }}-${{ matrix.label }}.tar.gz $GITHUB_WORKSPACE/

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/$env:BINARY.exe" `
            -DestinationPath "$env:BINARY-${{ github.ref_name }}-${{ matrix.label }}.zip"

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.BINARY }}-${{ github.ref_name }}-${{ matrix.label }}.tar.gz
            ${{ env.BINARY }}-${{ github.ref_name }}-${{ matrix.label }}.zip
          fail_on_unmatched_files: false
          generate_release_notes: false
